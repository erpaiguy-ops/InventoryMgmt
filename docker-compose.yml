# Local development composition for the web and api apps.
# Supabase is a managed cloud project (dmoqvnkdnrclojhcpnre) — there is no
# local Postgres/Supabase container; both services connect out to the cloud
# project using the credentials in your .env file.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: inventory-mgmt-api:local
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: inventory-mgmt-web:local
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
