name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"
  # Non-secret placeholder values so build-time env validation passes in CI.
  # Real deploys must supply these via repository/environment secrets.
  NEXT_PUBLIC_SUPABASE_URL: https://dmoqvnkdnrclojhcpnre.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
  NEXT_PUBLIC_API_URL: http://localhost:3001
  SUPABASE_URL: https://dmoqvnkdnrclojhcpnre.supabase.co
  SUPABASE_ANON_KEY: ci-placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
  JWT_SECRET: ci-placeholder-jwt-secret-value

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Format check
        run: pnpm format:check
